[alembic]
script_location = alembic
# NOTE: The sync URL below is overridden at runtime by env.py via app.core.config.
# This placeholder value ensures Alembic CLI commands work offline.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/shl_ai

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
